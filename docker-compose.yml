services:
  proxypools:
    image: ghcr.io/zj-zhangcn/proxypools:${IMAGE_TAG:-main}
    restart: unless-stopped
    ports:
      - "${ADMIN_LISTEN_PORT:-8080}:${ADMIN_LISTEN_PORT:-8080}"
      - "${HTTP_LISTEN_PORT:-7777}:${HTTP_LISTEN_PORT:-7777}"
      - "${SOCKS_LISTEN_PORT:-7780}:${SOCKS_LISTEN_PORT:-7780}"
    volumes:
      - ./data:/app/data
    env_file:
      - .env
